x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: airflow-dbt-duckdb:latest
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: '120'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Allow up to 5 min without a heartbeat before killing a task (default 30s is too short
    # for the 1 GB TPC-H dbgen call which saturates CPU/memory and causes transient DNS blips)
    AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: '300'
    # Suppress openlineage warning — not using this integration
    AIRFLOW__OPENLINEAGE__DISABLED: 'true'
    # Use memory:// URI to satisfy flask-limiter and silence the warning
    RATELIMIT_STORAGE_URI: 'memory://'
    # DuckLake catalog: PostgreSQL as the metadata store (supports multiple concurrent clients)
    DUCKLAKE_CATALOG_CONN: "postgres:dbname=ducklake_catalog host=postgres user=airflow password=airflow"
    # Parquet data files are stored here inside the shared warehouse volume
    DUCKLAKE_DATA_PATH: /opt/warehouse/data
    # TPC-H scale factor: sf=1 ≈ 1 GB, sf=3 ≈ 3 GB, sf=10 ≈ 10 GB
    TPCH_SCALE_FACTOR: ${TPCH_SCALE_FACTOR:-1}
    # Tell dbt to use the 'dev' target inside Docker (profiles.yml default is 'local')
    DBT_TARGET: dev
    # Tell dbt where to find profiles.yml (mounted at /opt/airflow/dbt/)
    DBT_PROFILES_DIR: /opt/airflow/dbt
    # Packages are baked into the image via docker/requirements.txt — no runtime installs
    _PIP_ADDITIONAL_REQUIREMENTS: ''
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/dbt:/opt/airflow/dbt
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    - ${AIRFLOW_PROJ_DIR:-.}/include:/opt/airflow/include
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/airflow/scripts
    - warehouse:/opt/warehouse  # Shared DuckDB warehouse volume
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    command: postgres -c log_min_duration_statement=2000 -c log_statement=none
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./docker/init-ducklake-db.sql:/docker-entrypoint-initdb.d/init-ducklake-db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  grafana:
    image: grafana/grafana:13.0.2
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/airflow_pipeline.json
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    restart: always

  prometheus:
    image: prom/prometheus:v3.12.0
    user: "65534:65534"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - otel-collector
    restart: always

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: always

  ducklake-metrics:
    build:
      context: .
      dockerfile: docker/Dockerfile.metrics
    environment:
      DUCKLAKE_PG_HOST: postgres
      DUCKLAKE_PG_PORT: 5432
      DUCKLAKE_PG_DB: ducklake_catalog
      DUCKLAKE_PG_USER: airflow
      DUCKLAKE_PG_PASSWORD: airflow
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      SCRAPE_INTERVAL: 60
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /opt/warehouse
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins} /opt/warehouse
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources
      - warehouse:/opt/warehouse

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume:
  warehouse:  # Shared volume for DuckDB warehouse file
  grafana-storage:
  prometheus-data:
