version: 2

sources:
  - name: tpch
    description: TPC-H benchmark data generated by DuckDB dbgen (sf=1, ~1 GB)
    schema: main
    tables:
      - name: customer
        description: Customer master — 150,000 rows at sf=1
        columns:
          - name: c_custkey
            description: Primary key
          - name: c_name
            description: Customer name
          - name: c_address
            description: Street address
          - name: c_phone
            description: Phone number
          - name: c_acctbal
            description: Account balance
          - name: c_mktsegment
            description: Market segment (AUTOMOBILE, BUILDING, FURNITURE, HOUSEHOLD, MACHINERY)
          - name: c_nationkey
            description: FK to nation

      - name: orders
        description: Purchase orders — 1,500,000 rows at sf=1
        columns:
          - name: o_orderkey
            description: Primary key
          - name: o_custkey
            description: FK to customer
          - name: o_totalprice
            description: Total order price (sum of lineitems before adjustments)
          - name: o_orderdate
            description: Order date
          - name: o_orderstatus
            description: O=open, F=fulfilled, P=partial
          - name: o_orderpriority
            description: "1-URGENT, 2-HIGH, 3-MEDIUM, 4-NOT SPECIFIED, 5-LOW"
          - name: o_clerk
            description: Clerk who processed the order
          - name: o_shippriority
            description: Ship priority (0 = standard)

      - name: lineitem
        description: Order line items — ~6,000,000 rows at sf=1
        columns:
          - name: l_orderkey
            description: FK to orders
          - name: l_linenumber
            description: Line position within order
          - name: l_quantity
            description: Units ordered
          - name: l_extendedprice
            description: Gross line price (quantity × unit price)
          - name: l_discount
            description: Discount rate (0.00–0.10)
          - name: l_tax
            description: Tax rate (0.00–0.08)
          - name: l_returnflag
            description: R=returned, A=accepted, N=none
          - name: l_linestatus
            description: O=open, F=fulfilled
          - name: l_shipdate
            description: Actual ship date
          - name: l_commitdate
            description: Committed delivery date
          - name: l_shipmode
            description: AIR, MAIL, RAIL, REG AIR, SHIP, TRUCK, FOB
