version: 2

models:
  - name: stg_customers
    description: Customers from TPC-H — 150,000 rows at sf=1
    columns:
      - name: customer_id
        description: Primary key (c_custkey)
        tests:
          - unique
          - not_null
      - name: customer_name
        description: Customer name
        tests:
          - not_null
      - name: phone
        description: Phone number
      - name: address
        description: Street address
      - name: account_balance
        description: Account balance in USD
      - name: market_segment
        description: AUTOMOBILE, BUILDING, FURNITURE, HOUSEHOLD, or MACHINERY
      - name: nation_key
        description: FK to nation table

  - name: stg_orders
    description: Purchase orders from TPC-H — 1,500,000 rows at sf=1
    columns:
      - name: order_id
        description: Primary key (o_orderkey)
        tests:
          - unique
          - not_null
      - name: customer_id
        description: FK to stg_customers
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_amount
        description: Total order price
        tests:
          - not_null
      - name: order_date
        description: Date the order was placed
      - name: order_status
        description: O=open, F=fulfilled, P=partial
      - name: order_priority
        description: "1-URGENT through 5-LOW"
      - name: clerk
        description: Clerk who processed the order

  - name: stg_lineitem
    description: Order line items from TPC-H — ~6,000,000 rows at sf=1
    columns:
      - name: order_id
        description: FK to stg_orders (l_orderkey)
        tests:
          - not_null
      - name: line_number
        description: Position within the order
        tests:
          - not_null
      - name: quantity
        description: Units ordered
      - name: extended_price
        description: Gross line price (quantity × unit price)
      - name: discount
        description: Discount rate applied (0.00–0.10)
      - name: tax
        description: Tax rate (0.00–0.08)
      - name: net_price
        description: extended_price × (1 - discount)
      - name: gross_price
        description: net_price × (1 + tax)
      - name: return_flag
        description: R=returned, A=accepted, N=none
      - name: line_status
        description: O=open, F=fulfilled
      - name: ship_date
        description: Actual ship date
      - name: commit_date
        description: Committed delivery date
      - name: ship_mode
        description: AIR, MAIL, RAIL, REG AIR, SHIP, TRUCK, FOB
