global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: ducklake
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics

